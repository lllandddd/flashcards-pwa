<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f4ee">
    <title>French Cards</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">离线复习</p>
          <h1>French Cards</h1>
        </div>
        <div class="storage-pill" id="storageStatus">本地保存</div>
      </header>

      <nav class="tabs" aria-label="主要功能">
        <button class="tab is-active" data-view="reviewView">复习</button>
        <button class="tab" data-view="importView">导入</button>
        <button class="tab" data-view="setsView">词表</button>
        <button class="tab" data-view="backupView">备份</button>
      </nav>

      <main>
        <section id="reviewView" class="view is-active">
          <div class="review-toolbar">
            <label>
              词表
              <select id="activeSetSelect"></select>
            </label>
            <div class="segmented" aria-label="复习方向">
              <button data-mode="zh-fr" class="is-active">中→法</button>
              <button data-mode="fr-zh">法→中</button>
              <button data-mode="mixed">混合</button>
            </div>
          </div>

          <div class="progress-row">
            <span id="progressText">0 / 0</span>
            <span id="dueText">今日待复习 0</span>
          </div>

          <article class="card-stage">
            <button id="cardButton" class="flashcard" type="button">
              <span class="card-kicker" id="cardKicker">准备开始</span>
              <span class="card-main" id="cardMain">导入一组词表后开始复习</span>
              <span class="card-extra" id="cardExtra"></span>
            </button>
          </article>

          <div class="actions">
            <button id="againBtn" class="secondary" type="button">再复习</button>
            <button id="flipBtn" class="primary" type="button">翻面</button>
            <button id="knowBtn" class="secondary" type="button">我会了</button>
          </div>
        </section>

        <section id="importView" class="view">
          <div class="panel">
            <label>
              词表名称
              <input id="setNameInput" type="text" value="今日词表" autocomplete="off">
            </label>
            <label>
              粘贴内容
              <textarea id="importText" spellcheck="false">maison | 房子 | une grande maison | 一栋大房子
prendre | 拿；乘坐 | Je prends le métro. | 我坐地铁。
toujours | 总是；仍然 | Il est toujours là. | 他仍然在那里。</textarea>
            </label>
            <p class="hint">支持格式：法语 | 中文 | 法语例句 | 中文例句。也支持 tab、逗号、分号分隔。</p>
            <div class="row-actions">
              <button id="previewBtn" class="secondary" type="button">预览</button>
              <button id="saveSetBtn" class="primary" type="button">保存词表</button>
            </div>
          </div>

          <div class="preview-list" id="previewList"></div>
        </section>

        <section id="setsView" class="view">
          <div class="list-header">
            <h2>本地词表</h2>
            <button id="newSampleBtn" class="secondary" type="button">加入示例</button>
          </div>
          <div id="setsList" class="sets-list"></div>
        </section>

        <section id="backupView" class="view">
          <div class="panel">
            <h2>备份</h2>
            <p class="hint">数据只存在当前浏览器。换手机、清理网站数据或卸载 PWA 前，先导出 JSON。</p>
            <div class="row-actions">
              <button id="exportBtn" class="primary" type="button">导出 JSON</button>
              <label class="file-button">
                导入 JSON
                <input id="importFile" type="file" accept="application/json">
              </label>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
